{% extends 'base.html' %}
{% block title %}Log In{% endblock %}

{% block content %}
<section aria-label="Login Form">
    <h1>Log into the Story Builder</h1>
    <form class="login-form" method="post">
        {% csrf_token %}
        <input class="login-form" type="email" name="email" placeholder="Email Address" required><br>
        <!-- <input class="login-form" type="text" name="username" placeholder="Username" required><br> -->
        <input class="login-form" type="password" name="password" placeholder="Password" required><br>
        <input class="login-form" type="submit" name="login">
    </form>
</section>
{% endblock %}
