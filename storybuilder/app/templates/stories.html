{% extends 'base.html' %}

{% block title %}Stories{% endblock %}

{% block content %}
<section class="stories-section">
    <h1>Your Stories</h1>
    <!-- Loop through the list of stories passed from the new_story view function.-->
    {% if not stories %}
    <p>You have no stories yet. When you do, they will be listed here.</p>

    {% else %}
    <table id="story-table">
        {% for story in stories %}
        <tr>
            <td>
                <a href={{ story.id }}>{{ story.title }}</a>
            </td>
            <td>
                <button>Move Up</button>
            </td>
            <td>
                <button>Move Down</button>
            </td>
            <td>
                <button onclick="window.location.href='{{ story.id }}/update/'">Edit Details</button>
            </td>
            <td>
                <button onclick="window.location.href='{{ story.id }}/delete/'">Delete Story</button>
            </td>
        </tr>
        {% endfor %}
    </table>
    {% endif %}
    <hr>

    <div class="big-btn">
        <button class="big-btn" onclick="window.location.href='new/'">New Story</button></section>
    </div>
</section>
{% endblock %}
